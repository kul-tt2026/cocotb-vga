name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: pytest -v

  sim-selftest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install iverilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - name: Run self-test (toy geometry)
        run: |
          cd sim
          make
          ! grep '<failure' results.xml
      - name: Upload captured frames
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: vga-selftest-frames
          path: sim/vga_out/*
